name: Java CI/CD with Docker

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. JDK 설정 및 빌드
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Gradle
        run: ./gradlew build -x test

      # 2. Docker 이미지 빌드 및 푸시
      - name: Docker login & push
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app .
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app

      # 3. NCP 서버 접속 및 배포
      - name: Deploy to NCP
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }} # 비밀번호가 있을 경우만 추가
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/my-app
            docker stop my-app-container || true
            docker rm my-app-container || true
            docker run -d --name my-app-container -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/my-app