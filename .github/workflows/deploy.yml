name: Java CI/CD with Docker

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. JDK 설정 및 빌드
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      # 소스 코드 가져오기 이후, 빌드 단계 이전에 추가
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew build -x test

      # 2. Docker 이미지 빌드 및 푸시
      - name: Docker login & push
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app .
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app

      # 3. NCP 서버 접속 및 배포
      - name: Deploy to NCP
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo systemctl start docker
            
            timeout 30s bash -c '
              until sudo docker info >/dev/null 2>&1; do
                sleep 1
              done
            ' || { echo "Docker not ready"; exit 1; }
                    
            docker pull ${{ secrets.DOCKER_USERNAME }}/my-app
            docker stop my-app-container || true
            docker rm my-app-container || true
            docker run -d --name my-app-container -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/my-app